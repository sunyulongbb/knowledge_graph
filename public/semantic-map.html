<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>语义地图 / 知识星图</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(9, 17, 31, 0.82);
      --panel-strong: rgba(10, 20, 38, 0.92);
      --border: rgba(148, 163, 184, 0.24);
      --text: #e5eefb;
      --muted: #9fb3cd;
      --accent: #4cc9f0;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(76, 201, 240, 0.08), transparent 34%),
        radial-gradient(circle at 20% 80%, rgba(245, 158, 11, 0.08), transparent 30%),
        linear-gradient(180deg, #040b16 0%, #07111f 100%);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #deck-root {
      position: absolute;
      inset: 0;
    }

    .top-search {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      width: min(360px, calc(100vw - 36px));
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-card,
    .legend-card,
    .detail-card,
    .stats-card {
      backdrop-filter: blur(14px);
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .search-card {
      border-radius: 18px;
      padding: 14px;
    }

    .search-title {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-input {
      flex: 1 1 auto;
      min-width: 0;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
      font-size: 14px;
    }

    .search-input:focus {
      border-color: rgba(76, 201, 240, 0.6);
      box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.12);
    }

    .search-action {
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
      color: #fff;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
    }

    .search-results {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
    }

    .search-result {
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
    }

    .search-result:hover,
    .search-result.active {
      border-color: rgba(76, 201, 240, 0.4);
      background: rgba(76, 201, 240, 0.08);
    }

    .search-result-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .search-result-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .stats-card {
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .right-panel {
      position: absolute;
      top: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      width: min(360px, calc(100vw - 36px));
      pointer-events: none;
    }

    .detail-card {
      width: 100%;
      height: 100%;
      border-radius: 24px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
    }

    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .detail-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .detail-subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .detail-hot {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(251, 191, 36, 0.14);
      color: #facc15;
      font-size: 12px;
      white-space: nowrap;
    }

    .detail-body {
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .detail-section {
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .detail-section h3 {
      margin: 0 0 10px;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 8px 12px;
      font-size: 13px;
    }

    .detail-grid dt {
      color: var(--muted);
    }

    .detail-grid dd {
      margin: 0;
      color: var(--text);
      word-break: break-word;
    }

    .detail-media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      gap: 12px;
    }

    .detail-media-item {
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      transition:
        transform 160ms ease,
        border-color 160ms ease,
        box-shadow 160ms ease;
    }

    .detail-media-item:hover {
      transform: translateY(-2px);
      border-color: rgba(76, 201, 240, 0.28);
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .detail-media-thumb,
    .detail-media-video {
      width: 100%;
      display: block;
      background: rgba(2, 6, 23, 0.92);
    }

    .detail-media-thumb {
      aspect-ratio: 16 / 10;
      object-fit: cover;
      cursor: zoom-in;
    }

    .detail-media-video {
      max-height: 240px;
    }

    .detail-link-card {
      display: block;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(125, 211, 252, 0.18);
      background: linear-gradient(
        180deg,
        rgba(14, 165, 233, 0.08) 0%,
        rgba(59, 130, 246, 0.04) 100%
      );
      color: #7dd3fc;
      text-decoration: none;
      word-break: break-all;
      transition:
        border-color 160ms ease,
        transform 160ms ease;
    }

    .detail-link-card:hover {
      border-color: rgba(125, 211, 252, 0.38);
      transform: translateY(-1px);
    }

    .detail-empty {
      margin: auto 0;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .legend-wrap {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 10;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .legend-card {
      border-radius: 18px;
      padding: 12px 14px;
      min-width: 220px;
    }

    .legend-title {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .legend-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex: 0 0 auto;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.08);
    }

    .tooltip {
      position: fixed;
      z-index: 30;
      pointer-events: none;
      display: none;
      min-width: 120px;
      max-width: 240px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(3, 8, 19, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.24);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      transform: translate(12px, 12px);
    }

    .tooltip-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
    }

    .tooltip-meta {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .top-search,
      .right-panel {
        width: calc(100vw - 24px);
        left: 12px;
        right: 12px;
      }

      .top-search {
        top: 12px;
      }

      .right-panel {
        top: auto;
        bottom: 12px;
        height: min(44vh, 360px);
      }

      .legend-wrap {
        left: 12px;
        bottom: calc(min(44vh, 360px) + 24px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="deck-root"></div>

    <section class="top-search">
      <div class="search-card">
        <div class="search-title">语义检索</div>
        <div class="search-row">
          <input
            id="semanticSearchInput"
            class="search-input"
            type="search"
            placeholder="搜索名称、标签、描述"
            autocomplete="off"
          />
          <button id="semanticSearchButton" class="search-action" type="button">定位</button>
        </div>
        <div id="semanticSearchResults" class="search-results" style="display:none;"></div>
      </div>

      <div id="semanticStats" class="stats-card">正在加载语义节点...</div>
    </section>

    <aside class="right-panel">
      <div class="detail-card">
        <div class="detail-head">
          <div>
            <h1 class="detail-title">节点详情</h1>
            <div class="detail-subtitle">点击语义空间中的节点查看详情。</div>
          </div>
          <div id="semanticDetailHot" class="detail-hot" style="display:none;"></div>
        </div>
        <div id="semanticDetailBody" class="detail-body">
          <div class="detail-empty">拖拽、缩放或搜索地图后，点击节点即可在这里查看详情。</div>
        </div>
      </div>
    </aside>

    <div class="legend-wrap">
      <div class="legend-card">
        <div class="legend-title">图例</div>
        <div id="semanticLegend" class="legend-list"></div>
      </div>
    </div>

    <div id="semanticTooltip" class="tooltip"></div>
  </div>

  <script src="/node_modules/deck.gl/dist.min.js"></script>
  <script src="/assets/scripts/semantic-map.js"></script>
</body>
</html>
